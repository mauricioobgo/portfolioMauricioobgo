name: Build and Deploy Flet Portfolio

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: Refresh scope to run before building the portfolio.
        required: true
        default: all
        type: choice
        options:
          - weekly
          - monthly
          - all
  schedule:
    - cron: "0 7 * * 1"
    - cron: "0 7 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FLET_CLI_NO_RICH_OUTPUT: 1
  GITHUB_USERNAME: mauricioobgo
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sync_scope: ${{ steps.scope.outputs.sync_scope }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Determine refresh scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 7 * * 1" ]]; then
              echo "sync_scope=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "sync_scope=monthly" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "sync_scope=${{ inputs.scope }}" >> "$GITHUB_OUTPUT"
          else
            echo "sync_scope=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh generated GitHub/profile data
        run: uv run python -m portfolio_app.scripts.sync_data --scope ${{ steps.scope.outputs.sync_scope }}

      - name: Publish resume drift summary
        shell: bash
        run: |
          if [[ -f "portfolio_app/generated/resume_drift.json" ]]; then
            {
              echo "### Resume drift report"
              echo '```json'
              cat portfolio_app/generated/resume_drift.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build portfolio content asset
        run: uv run python -m portfolio_app.scripts.build_content

      - name: Validate certification links
        run: uv run python -m portfolio_app.scripts.validate_links

      - name: Run lint
        run: uvx --from ruff ruff check .

      - name: Run format check
        run: uvx --from ruff ruff format --check .

      - name: Run tests
        run: uv run python -m pytest -q

      - name: Build Flet static website
        run: uv run flet build web --yes --base-url /portfolioMauricioobgo/ --route-url-strategy hash

      - name: Upload resume drift artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-drift-report
          path: portfolio_app/generated/resume_drift.json
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
          name: web-build-artifact
          retention-days: 20

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: web-build-artifact
