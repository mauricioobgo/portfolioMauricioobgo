name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: uv sync --frozen
      - run: uvx --from ruff ruff check .
      - run: uvx --from ruff ruff format --check .
      - run: uvx --with . --from pytest python -m pytest -q
      - run: uv run python -m portfolio_app.scripts.build_frontend_content
      - run: flutter pub get
        working-directory: frontend
      - run: dart format --set-exit-if-changed .
        working-directory: frontend
      - run: flutter analyze
        working-directory: frontend
      - run: flutter test
        working-directory: frontend
      - run: flutter build web --release --base-href /portfolioMauricioobgo/ --pwa-strategy=none
        working-directory: frontend
