name: Refresh GitHub Pages

on:
  schedule:
    - cron: "0 7 * * 1"
    - cron: "0 7 1 * *"
  workflow_dispatch:
    inputs:
      scope:
        description: Sync scope to refresh before deploying.
        required: true
        default: all
        type: choice
        options:
          - weekly
          - monthly
          - all

permissions:
  contents: write

concurrency:
  group: refresh-gh-pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: uv sync --frozen
      - id: scope
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 7 * * 1" ]]; then
              echo "sync_scope=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "sync_scope=monthly" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sync_scope=${{ inputs.scope }}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - run: uv run python -m portfolio_app.scripts.sync_data --scope ${{ steps.scope.outputs.sync_scope }}
      - run: uv run python -m portfolio_app.scripts.build_frontend_content
      - run: flutter pub get
        working-directory: frontend
      - run: flutter build web --release --base-href /portfolioMauricioobgo/ --pwa-strategy=none
        working-directory: frontend
      - name: Verify publish folder
        run: |
          test -f frontend/build/web/index.html
          test -f frontend/build/web/manifest.json
          test -f frontend/build/web/favicon.png
          test -d frontend/build/web/assets
          touch frontend/build/web/.nojekyll
        shell: bash
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/build/web
          clean: true
          single-commit: true
