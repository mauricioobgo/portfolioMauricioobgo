name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: uv sync --frozen
      - run: uv run python -m portfolio_app.scripts.sync_data --scope all
      - run: uv run python -m portfolio_app.scripts.build_frontend_content
      - run: flutter pub get
        working-directory: frontend
      - run: flutter build web --release --base-href /portfolioMauricioobgo/ --pwa-strategy=none
        working-directory: frontend
      - name: Verify publish folder
        run: |
          test -f frontend/build/web/index.html
          test -f frontend/build/web/manifest.json
          test -f frontend/build/web/favicon.png
          test -d frontend/build/web/assets
          touch frontend/build/web/.nojekyll
        shell: bash
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/build/web
          clean: true
          single-commit: true
